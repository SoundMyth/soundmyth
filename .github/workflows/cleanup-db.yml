name: Clean DB (junk + city canon)

# On-demand DB cleanup WITHOUT a full scrape: deletes mislabelled junk events and
# canonicalizes city names on existing rows. Runs in ~1 min.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: scraper
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Discover unlisted EDM DJs (RA-verified)
        continue-on-error: true
        timeout-minutes: 15
        # Refreshes data/artists_candidates.json before the gate runs so EDM DJs we
        # don't track yet are kept (not deleted). Incremental — only new DJs hit RA.
        run: node discover-djs.js

      - name: Clean junk + canonicalize cities
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node cleanup-junk.js
