name: Weekly Scrape & Purge

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120   # DJ scrape (~20m) + image enrichment (~16m) sit close to the old 65m cap

    defaults:
      run:
        working-directory: scraper

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scraper/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Enrich Songkick URLs
        continue-on-error: true
        timeout-minutes: 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node enrich-songkick-urls.js

      - name: Scrape DJs (BIT + Songkick cascade)
        continue-on-error: true
        timeout-minutes: 20
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BIT_APP_ID: ${{ secrets.BIT_APP_ID }}
        run: node scrape-extended.js

      - name: Scrape Festivals (BIT + Songkick)
        continue-on-error: true
        timeout-minutes: 15
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BIT_APP_ID: ${{ secrets.BIT_APP_ID }}
        run: node scrape-festivals-bit.js

      - name: Scrape Festivals (direct websites)
        continue-on-error: true
        timeout-minutes: 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scrape-festivals-direct.js

      - name: Enrich Clubs (RA URLs)
        continue-on-error: true
        timeout-minutes: 10
        # Auto-fills ra_url for clubs that have none (no secrets: only calls ra.co).
        # The filled URLs are persisted by the "Commit updated data files" step.
        run: node enrich-clubs-ra.js

      - name: Scrape Clubs (Resident Advisor)
        continue-on-error: true
        timeout-minutes: 10
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scrape-clubs-ra.js

      - name: Deduplicate events
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node dedupe.js

      - name: Clean mislabelled junk events
        continue-on-error: true
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node cleanup-junk.js

      - name: Enrich event images (festivals + DJs)
        continue-on-error: true
        timeout-minutes: 20
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node enrich-images.js

      - name: Validate & fix data quality
        continue-on-error: true
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node validate.js

      - name: Purge old events (>15 days)
        timeout-minutes: 5
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node purge.js

      - name: Commit updated data files
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scraper/data/*.json
          git diff --staged --quiet || { git commit -m "data: weekly scrape update $(date +%Y-%m-%d)" && git push; }
